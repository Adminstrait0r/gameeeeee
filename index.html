<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gacha Units Manager</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Cloudinary Upload Widget -->
    <script src="https://widget.cloudinary.com/v2.0/global/all.js" type="text/javascript"></script>
    <style>
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 0.5rem;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 1.5rem;
        }
    </style>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">Gacha Units Manager</h1>

        <!-- Filters -->
        <div class="bg-white rounded-lg shadow p-4 mb-6 flex flex-wrap gap-4 items-end">
            <div>
                <label class="block text-sm font-medium text-gray-700">Category</label>
                <select id="filterCategory" class="mt-1 block w-40 border-gray-300 rounded-md shadow-sm">
                    <option value="">All</option>
                    <option value="player">Player</option>
                    <option value="campaign">Campaign</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Type</label>
                <input type="text" id="filterType" placeholder="e.g., archer" class="mt-1 block w-40 border-gray-300 rounded-md shadow-sm">
            </div>
            <button id="applyFilters" class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700">Apply Filters</button>
            <button id="resetFilters" class="bg-gray-500 text-white px-4 py-2 rounded-md hover:bg-gray-600">Reset</button>
            <button id="addNewBtn" class="bg-green-600 text-white px-4 py-2 rounded-md hover:bg-green-700 ml-auto">+ Add New Unit</button>
        </div>

        <!-- Units Table -->
        <div class="bg-white rounded-lg shadow overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Image</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Category</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Type</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Health</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Attack</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Defense</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Atk Speed</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Crit %</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Dodge %</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Weight</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="unitsTableBody" class="bg-white divide-y divide-gray-200">
                        <tr><td colspan="12" class="text-center py-4">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal for Add/Edit -->
    <div id="unitModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold" id="modalTitle">Add New Unit</h2>
                <button id="closeModal" class="text-gray-500 hover:text-gray-700">&times;</button>
            </div>
            <form id="unitForm">
                <input type="hidden" id="unitId" value="">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Name *</label>
                        <input type="text" id="name" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Category *</label>
                        <select id="category" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm">
                            <option value="player">Player</option>
                            <option value="campaign">Campaign</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Type *</label>
                        <input type="text" id="type" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Gacha Weight *</label>
                        <input type="number" id="gacha_weight" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Health Min *</label>
                        <input type="number" id="health_min" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Health Max *</label>
                        <input type="number" id="health_max" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Attack Min *</label>
                        <input type="number" id="attack_min" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Attack Max *</label>
                        <input type="number" id="attack_max" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Defense Min *</label>
                        <input type="number" id="defense_min" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Defense Max *</label>
                        <input type="number" id="defense_max" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Attack Speed *</label>
                        <input type="number" step="0.1" id="attack_speed" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Critical Chance (0-1) *</label>
                        <input type="number" step="0.01" id="critical_chance" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Dodge Chance (0-1) *</label>
                        <input type="number" step="0.01" id="dodge_chance" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700">Image URL</label>
                        <div class="flex gap-2">
                            <input type="text" id="image_url" class="flex-1 border-gray-300 rounded-md shadow-sm">
                            <button type="button" id="uploadImageBtn" class="bg-indigo-600 text-white px-4 py-2 rounded-md hover:bg-indigo-700">Upload Image</button>
                        </div>
                        <div id="imagePreview" class="mt-2"></div>
                    </div>
                </div>
                <div class="mt-6 flex justify-end gap-3">
                    <button type="button" id="cancelModal" class="bg-gray-300 text-gray-700 px-4 py-2 rounded-md hover:bg-gray-400">Cancel</button>
                    <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700">Save Unit</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        (function() {
            // Supabase configuration
            const SUPABASE_URL = 'https://atcyykmikuidfitbgchw.supabase.co';
            const SUPABASE_KEY = 'sb_publishable_F7WF15HzgLDsfe0BU9tgpQ_zBz8Ympu';
            const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            // Cloudinary configuration
            const CLOUDINARY_CLOUD_NAME = 'dosljkrlz';
            const UPLOAD_PRESET = 'units_01';

            let currentFilter = { category: '', type: '' };
            let currentEditId = null;

            const tableBody = document.getElementById('unitsTableBody');
            const filterCategory = document.getElementById('filterCategory');
            const filterType = document.getElementById('filterType');
            const applyFiltersBtn = document.getElementById('applyFilters');
            const resetFiltersBtn = document.getElementById('resetFilters');
            const addNewBtn = document.getElementById('addNewBtn');
            const modal = document.getElementById('unitModal');
            const modalTitle = document.getElementById('modalTitle');
            const unitForm = document.getElementById('unitForm');
            const closeModalBtn = document.getElementById('closeModal');
            const cancelModalBtn = document.getElementById('cancelModal');
            const uploadImageBtn = document.getElementById('uploadImageBtn');
            const imageUrlInput = document.getElementById('image_url');
            const imagePreview = document.getElementById('imagePreview');

            async function fetchUnits() {
                let query = supabaseClient.from('gacha_units').select('*');
                if (currentFilter.category) query = query.eq('category', currentFilter.category);
                if (currentFilter.type) query = query.ilike('type', `%${currentFilter.type}%`);
                const { data, error } = await query;
                if (error) {
                    console.error('Error fetching units:', error);
                    return [];
                }
                return data;
            }

            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }

            function renderUnits(units) {
                if (!units.length) {
                    tableBody.innerHTML = '<tr><td colspan="12" class="text-center py-4">No units found.</td></tr>';
                    return;
                }
                tableBody.innerHTML = units.map(unit => `
                    <tr>
                        <td class="px-6 py-4 whitespace-nowrap">${unit.image_url ? `<img src="${unit.image_url}" alt="${unit.name}" class="w-10 h-10 object-cover rounded">` : '-'}</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium">${escapeHtml(unit.name)}</td>
                        <td class="px-6 py-4 whitespace-nowrap capitalize">${unit.category}</td>
                        <td class="px-6 py-4 whitespace-nowrap">${escapeHtml(unit.type)}</td>
                        <td class="px-6 py-4 whitespace-nowrap">${unit.health_min} - ${unit.health_max}</td>
                        <td class="px-6 py-4 whitespace-nowrap">${unit.attack_min} - ${unit.attack_max}</td>
                        <td class="px-6 py-4 whitespace-nowrap">${unit.defense_min} - ${unit.defense_max}</td>
                        <td class="px-6 py-4 whitespace-nowrap">${unit.attack_speed}</td>
                        <td class="px-6 py-4 whitespace-nowrap">${(unit.critical_chance * 100).toFixed(0)}%</td>
                        <td class="px-6 py-4 whitespace-nowrap">${(unit.dodge_chance * 100).toFixed(0)}%</td>
                        <td class="px-6 py-4 whitespace-nowrap">${unit.gacha_weight}</td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <button class="edit-btn text-blue-600 hover:text-blue-900 mr-2" data-id="${unit.id}">Edit</button>
                            <button class="delete-btn text-red-600 hover:text-red-900" data-id="${unit.id}">Delete</button>
                        </td>
                    </tr>
                `).join('');

                document.querySelectorAll('.edit-btn').forEach(btn => {
                    btn.addEventListener('click', () => editUnit(parseInt(btn.dataset.id)));
                });
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', () => deleteUnit(parseInt(btn.dataset.id)));
                });
            }

            async function loadAndRender() {
                const units = await fetchUnits();
                renderUnits(units);
            }

            async function saveUnit(event) {
                event.preventDefault();
                const formData = {
                    name: document.getElementById('name').value,
                    category: document.getElementById('category').value,
                    type: document.getElementById('type').value,
                    gacha_weight: parseInt(document.getElementById('gacha_weight').value),
                    health_min: parseInt(document.getElementById('health_min').value),
                    health_max: parseInt(document.getElementById('health_max').value),
                    attack_min: parseInt(document.getElementById('attack_min').value),
                    attack_max: parseInt(document.getElementById('attack_max').value),
                    defense_min: parseInt(document.getElementById('defense_min').value),
                    defense_max: parseInt(document.getElementById('defense_max').value),
                    attack_speed: parseFloat(document.getElementById('attack_speed').value),
                    critical_chance: parseFloat(document.getElementById('critical_chance').value),
                    dodge_chance: parseFloat(document.getElementById('dodge_chance').value),
                    image_url: imageUrlInput.value || null
                };

                if (formData.health_min > formData.health_max ||
                    formData.attack_min > formData.attack_max ||
                    formData.defense_min > formData.defense_max) {
                    alert('Min values must be less than or equal to max values.');
                    return;
                }

                let result;
                if (currentEditId) {
                    result = await supabaseClient.from('gacha_units').update(formData).eq('id', currentEditId);
                } else {
                    result = await supabaseClient.from('gacha_units').insert([formData]);
                }

                if (result.error) {
                    console.error('Error saving unit:', result.error);
                    alert('Failed to save unit: ' + result.error.message);
                } else {
                    closeModal();
                    loadAndRender();
                }
            }

            async function editUnit(id) {
                const { data, error } = await supabaseClient.from('gacha_units').select('*').eq('id', id).single();
                if (error) {
                    console.error('Error fetching unit:', error);
                    return;
                }
                if (data) {
                    currentEditId = data.id;
                    modalTitle.innerText = 'Edit Unit';
                    document.getElementById('name').value = data.name;
                    document.getElementById('category').value = data.category;
                    document.getElementById('type').value = data.type;
                    document.getElementById('gacha_weight').value = data.gacha_weight;
                    document.getElementById('health_min').value = data.health_min;
                    document.getElementById('health_max').value = data.health_max;
                    document.getElementById('attack_min').value = data.attack_min;
                    document.getElementById('attack_max').value = data.attack_max;
                    document.getElementById('defense_min').value = data.defense_min;
                    document.getElementById('defense_max').value = data.defense_max;
                    document.getElementById('attack_speed').value = data.attack_speed;
                    document.getElementById('critical_chance').value = data.critical_chance;
                    document.getElementById('dodge_chance').value = data.dodge_chance;
                    imageUrlInput.value = data.image_url || '';
                    updateImagePreview(data.image_url);
                    openModal();
                }
            }

            async function deleteUnit(id) {
                if (confirm('Are you sure you want to delete this unit?')) {
                    const { error } = await supabaseClient.from('gacha_units').delete().eq('id', id);
                    if (error) {
                        console.error('Error deleting unit:', error);
                        alert('Failed to delete unit: ' + error.message);
                    } else {
                        loadAndRender();
                    }
                }
            }

            function openModal() {
                modal.classList.remove('hidden');
            }

            function closeModal() {
                modal.classList.add('hidden');
                unitForm.reset();
                currentEditId = null;
                modalTitle.innerText = 'Add New Unit';
                imageUrlInput.value = '';
                updateImagePreview('');
            }

            function updateImagePreview(url) {
                if (url) {
                    imagePreview.innerHTML = `<img src="${url}" alt="Preview" class="h-20 rounded shadow">`;
                } else {
                    imagePreview.innerHTML = '';
                }
            }

            function openCloudinaryWidget() {
                const widget = window.cloudinary.createUploadWidget(
                    {
                        cloudName: CLOUDINARY_CLOUD_NAME,
                        uploadPreset: UPLOAD_PRESET,
                        cropping: true,
                        multiple: false,
                        sources: ['local', 'url', 'camera']
                    },
                    (error, result) => {
                        if (error) {
                            console.error('Cloudinary error:', error);
                            return;
                        }
                        if (result.event === 'success') {
                            const uploadedUrl = result.info.secure_url;
                            imageUrlInput.value = uploadedUrl;
                            updateImagePreview(uploadedUrl);
                        }
                    }
                );
                widget.open();
            }

            function applyFilters() {
                currentFilter.category = filterCategory.value;
                currentFilter.type = filterType.value;
                loadAndRender();
            }

            function resetFilters() {
                filterCategory.value = '';
                filterType.value = '';
                currentFilter = { category: '', type: '' };
                loadAndRender();
            }

            function init() {
                loadAndRender();
                applyFiltersBtn.addEventListener('click', applyFilters);
                resetFiltersBtn.addEventListener('click', resetFilters);
                addNewBtn.addEventListener('click', () => {
                    currentEditId = null;
                    modalTitle.innerText = 'Add New Unit';
                    unitForm.reset();
                    openModal();
                });
                closeModalBtn.addEventListener('click', closeModal);
                cancelModalBtn.addEventListener('click', closeModal);
                unitForm.addEventListener('submit', saveUnit);
                uploadImageBtn.addEventListener('click', openCloudinaryWidget);
            }

            init();
        })();
    </script>
</body>
</html>
